# This is a Databricks asset bundle definition for spark_streaming.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: spark_streaming
  uuid: 7075be78-c92c-4ab5-890d-16a12e014c1b

include:
  - resources/jobs/*.yml
sync:
  include:
    - src/streaming_project/ddl/**
    - src/streaming_project/invoices_load/**
    - src/streaming_project/table_volume_schema_creation/**
    - src/streaming_project/utils/**

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  env:
    description: The environment to use
  catalog:
    description: The catalog to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-cee3895b-7255.cloud.databricks.com/
      root_path: /Workspace/.bundle/${bundle.name}/${workspace.current_user.userName}/${bundle.target}  
    variables:
      env: DEV
      catalog: lakehouse_dev

  prod:
    mode: production
    workspace:
      host: https://dbc-cee3895b-7255.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/praveenpeterbangari@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/.bundle/${bundle.name}/prod/${bundle.target}
    variables:
      env: PROD
      catalog: lakehouse_prod
    permissions:
      - user_name: praveenpeterbangari@gmail.com
        level: CAN_MANAGE
